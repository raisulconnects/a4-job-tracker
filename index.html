<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Tailwind CSS and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- For Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-screen-xl mx-auto">
    <header>
      <section class="py-[50px]">
        <h1 class="text-[32px] font-bold py-10">Job Application Tracker</h1>
        <div class="flex gap-5">
          <div class="bg-[#f4f4f43b] p-5 rounded-lg shadow-sm w-full">
            <h1 class="text-[14px] font-medium">Total</h1>
            <h2 class="text-[24px] font-bold">8</h2>
          </div>
          <div class="bg-[#f4f4f43b] p-5 rounded-lg shadow-sm w-full">
            <h1 class="text-[14px] font-medium">Interview</h1>
            <h2 class="text-[24px] font-bold">0</h2>
          </div>
          <div class="bg-[#f4f4f43b] p-5 rounded-lg shadow-sm w-full">
            <h1 class="text-[14px] font-medium">Rejected</h1>
            <h2 class="text-[24px] font-bold">0</h2>
          </div>
        </div>
      </section>
    </header>

    <hr />

    <!-- Ekhane shob job dekhabo ekbare -->
    <main>
      <section>
        <div class="flex justify-between p-2">
          <h1 class="text-[20px] font-bold">Available Jobs</h1>
          <p class="text-[20px] font-semibold">8 Jobs</p>
        </div>
      </section>
    </main>

    <footer></footer>

    <script src="script.js"></script>
  </body>
</html>
